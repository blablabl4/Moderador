<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Operador IDSR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #131a2b;
            --surface2: #1a2340;
            --accent: #6c5ce7;
            --accent2: #a29bfe;
            --green: #00e676;
            --red: #ff5252;
            --yellow: #ffd740;
            --text: #e8eaf6;
            --text-dim: #8892b0;
            --border: #1e2d4a;
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: #0f0f1a;
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid #e94560;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .header h1 span {
            color: #e94560;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-connected {
            background: rgba(0, 230, 118, 0.15);
            color: var(--green);
        }

        .status-disconnected {
            background: rgba(255, 82, 82, 0.15);
            color: var(--red);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.on {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
        }

        .status-dot.off {
            background: var(--red);
        }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body {
            padding: 20px;
        }

        /* QR Section */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .qr-container img {
            max-width: 280px;
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .qr-placeholder {
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border-radius: 8px;
            border: 2px dashed var(--border);
            color: var(--text-dim);
            font-size: 14px;
            text-align: center;
            padding: 20px;
        }

        .session-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Buttons */
        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent2);
        }

        .btn-danger {
            background: var(--red);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.85;
        }

        .btn-success {
            background: var(--green);
            color: #000;
        }

        .btn-success:hover {
            opacity: 0.85;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--surface2);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent2);
        }

        .stat-value.green {
            color: var(--green);
        }

        .stat-value.red {
            color: var(--red);
        }

        .stat-value.yellow {
            color: var(--yellow);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Config Form */
        .config-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .field label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input,
        .field textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        .field input:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .field textarea {
            resize: vertical;
            min-height: 80px;
        }

        .field .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Log */
        .log-area {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 260px;
            overflow-y: auto;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-area .ok {
            color: var(--green);
        }

        .log-area .err {
            color: var(--red);
        }

        .log-area .info {
            color: var(--accent2);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            background: var(--green);
            color: #000;
        }

        .toast.error {
            background: var(--red);
            color: white;
        }

        /* Two column layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 700px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📡 <span>Operador</span> IDSR</h1>
    </div>
    <!-- Hidden elements for pollHealth compatibility -->
    <span id="sessionName" style="display:none"></span>
    <span id="statusBadge" style="display:none"><span id="statusDot"></span><span id="statusText"></span></span>

    <div class="container">
        <!-- Operator Cards Grid -->
        <div id="operatorGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:20px;">
            <!-- Cards are dynamically rendered by JS -->
            <div style="color:var(--text-dim); text-align:center; padding:40px;">Carregando operadores...</div>
        </div>

        <!-- Estatísticas Gerais -->
        <div class="card">
            <div class="card-header">📊 Estatísticas Gerais</div>
            <div class="card-body">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value green" id="statForwarded">0</div>
                        <div class="stat-label">Encaminhados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value red" id="statFailed">0</div>
                        <div class="stat-label">Falhas</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statAdsDetected">0</div>
                        <div class="stat-label">Anúncios Detectados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value yellow" id="statPerHour">0</div>
                        <div class="stat-label">Esta Hora</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statSkipped">0</div>
                        <div class="stat-label">Ignorados</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statTargets">0</div>
                        <div class="stat-label">Grupos Destino</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Live Logs -->
    <div class="card" style="margin-top:20px;">
        <div class="card-header" style="display:flex; align-items:center; justify-content:space-between;">
            <span>📋 Logs em Tempo Real</span>
            <div style="display:flex; gap:8px;">
                <button id="logToggleBtn" onclick="toggleLogPoll()" style="background:#00e676;color:#000;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;">⏸ Pausar</button>
                <button onclick="clearLogPanel()" style="background:#444;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;">🗑 Limpar</button>
            </div>
        </div>
        <div class="card-body" style="padding:0;">
            <div id="logBox" style="background:#0a0e14; color:#c5cdd9; font-family:'Consolas','Fira Code',monospace; font-size:11px; line-height:1.6; padding:12px; height:350px; overflow-y:auto; white-space:pre-wrap; word-break:break-all;"></div>
        </div>
    </div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BASE = window.location.origin;
        let pollInterval = null;
        const qrPollers = {};
        const qrStateCache = {}; // Preserve QR images across re-renders

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        async function api(url, opts = {}) {
            try {
                const res = await fetch(BASE + url, opts);
                return await res.json();
            } catch (e) {
                console.error(`API error: ${e.message}`);
                return null;
            }
        }

        // ── Health / Stats ──────────────────────────────────────────────
        async function pollHealth() {
            const data = await api('/health');
            if (!data) return;

            document.getElementById('sessionName').textContent = data.session || '?';

            const badge = document.getElementById('statusBadge');
            const dot = document.getElementById('statusDot');
            const txt = document.getElementById('statusText');
            if (data.connected) {
                badge.className = 'status-badge status-connected';
                dot.className = 'status-dot on';
                txt.textContent = 'Conectado';
            } else {
                badge.className = 'status-badge status-disconnected';
                dot.className = 'status-dot off';
                txt.textContent = 'Desconectado';
            }

            const eng = data.engine || {};
            document.getElementById('statForwarded').textContent = eng.total_forwarded || 0;
            document.getElementById('statFailed').textContent = eng.total_failed || 0;
            document.getElementById('statAdsDetected').textContent = eng.total_ads_detected || 0;
            document.getElementById('statPerHour').textContent = eng.forwards_this_hour || 0;
            document.getElementById('statSkipped').textContent = eng.total_skipped_not_media || 0;
            document.getElementById('statTargets').textContent = data.target_groups || 0;
        }

        // ── Accordion ───────────────────────────────────────────────────
        const openAccordions = new Set();

        function toggleAccordion(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const arrow = el.previousElementSibling.querySelector('.acc-arrow');
            if (el.style.display === 'none') {
                el.style.display = 'block';
                if (arrow) arrow.textContent = '▼';
                openAccordions.add(id);
            } else {
                el.style.display = 'none';
                if (arrow) arrow.textContent = '▶';
                openAccordions.delete(id);
            }
        }

        function restoreAccordionState() {
            for (const id of openAccordions) {
                const el = document.getElementById(id);
                if (el) {
                    el.style.display = 'block';
                    const arrow = el.previousElementSibling?.querySelector('.acc-arrow');
                    if (arrow) arrow.textContent = '▼';
                }
            }
        }

        // ── Operator Card Rendering ─────────────────────────────────────
        function renderOperatorCard(s) {
            const borderColor = s.connected ? 'var(--green)' : 'var(--border)';
            const glow = s.connected ? 'box-shadow:0 0 12px rgba(0,206,117,0.3);' : '';
            const connBadge = s.connected
                ? '<span class="status-badge status-connected" style="font-size:11px;padding:3px 10px;">CONECTADO</span>'
                : '<span class="status-badge status-disconnected" style="font-size:11px;padding:3px 10px;">DESCONECTADO</span>';

            // QR area — use cached state if available
            let qrContent;
            if (qrStateCache[s.name]) {
                qrContent = qrStateCache[s.name];
            } else if (s.connected) {
                qrContent = '<div style="color:var(--green);font-size:14px;">✅ Sessão conectada</div>';
            } else {
                qrContent = '<div style="color:var(--text-dim);font-size:13px;">Clique "Iniciar / Reconectar" para gerar QR</div>';
            }

            // Per-bot stats
            const st = s.stats || {};

            return `
            <div class="card" style="border:1px solid ${borderColor}; ${glow}">
                <div class="card-header" style="display:flex; align-items:center; justify-content:space-between;">
                    <span>📡 ${s.name}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        ${connBadge}
                        <button onclick="event.stopPropagation(); deleteOperator('${s.name}')" style="background:none;border:none;color:#e17055;font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;transition:all 0.2s;" onmouseover="this.style.background='rgba(225,112,85,0.2)'" onmouseout="this.style.background='none'" title="Excluir operador">✕</button>
                    </div>
                </div>
                <div class="card-body" style="display:flex; flex-direction:column; gap:12px;">

                    <!-- QR Area -->
                    <div id="qr_${s.name}" style="background:var(--surface2); border-radius:8px; padding:16px; text-align:center; min-height:80px;">
                        ${qrContent}
                    </div>

                    <!-- Accordion: Status -->
                    <div class="acc-header" onclick="toggleAccordion('acc_status_${s.name}')" style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border);">
                        <span class="acc-arrow" style="font-size:10px;color:var(--text-dim);">▶</span>
                        <span style="font-size:13px; font-weight:600;">📋 Status</span>
                    </div>
                    <div id="acc_status_${s.name}" style="display:none; font-size:13px;">
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            <div style="display:flex; justify-content:space-between;">
                                <span>WPP Conexão</span>
                                ${s.connected
                                    ? '<span class="status-badge status-connected" style="font-size:10px;padding:3px 10px;">CONECTADO</span>'
                                    : '<span class="status-badge status-disconnected" style="font-size:10px;padding:3px 10px;">DESCONECTADO</span>'}
                            </div>
                            <div style="display:flex; justify-content:space-between; border-top:1px solid var(--border); padding-top:6px;">
                                <span style="color:var(--text-dim)">Sessão</span>
                                <span style="font-family:monospace; color:var(--accent2)">${s.name}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Accordion: Estatísticas -->
                    <div class="acc-header" onclick="toggleAccordion('acc_stats_${s.name}')" style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border);">
                        <span class="acc-arrow" style="font-size:10px;color:var(--text-dim);">▶</span>
                        <span style="font-size:13px; font-weight:600;">📊 Estatísticas</span>
                    </div>
                    <div id="acc_stats_${s.name}" style="display:none;">
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:12px;">
                            <div style="background:var(--surface2);border-radius:6px;padding:10px;text-align:center;">
                                <div style="font-size:18px;font-weight:700;color:var(--green);">${st.total_forwarded || 0}</div>
                                <div style="color:var(--text-dim);font-size:11px;">Encaminhados</div>
                            </div>
                            <div style="background:var(--surface2);border-radius:6px;padding:10px;text-align:center;">
                                <div style="font-size:18px;font-weight:700;color:var(--red);">${st.total_failed || 0}</div>
                                <div style="color:var(--text-dim);font-size:11px;">Falhas</div>
                            </div>
                            <div style="background:var(--surface2);border-radius:6px;padding:10px;text-align:center;">
                                <div style="font-size:18px;font-weight:700;">${st.total_ads_detected || 0}</div>
                                <div style="color:var(--text-dim);font-size:11px;">Anúncios</div>
                            </div>
                            <div style="background:var(--surface2);border-radius:6px;padding:10px;text-align:center;">
                                <div style="font-size:18px;font-weight:700;color:var(--yellow);">${st.forwards_this_hour || 0}</div>
                                <div style="color:var(--text-dim);font-size:11px;">Esta Hora</div>
                            </div>
                        </div>
                    </div>

                    <!-- Accordion: Configuração do Bot -->
                    <div class="acc-header" onclick="toggleAccordion('acc_cfg_${s.name}')" style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--border);">
                        <span class="acc-arrow" style="font-size:10px;color:var(--text-dim);">▶</span>
                        <span style="font-size:13px; font-weight:600;">⚙️ Configuração</span>
                    </div>
                    <div id="acc_cfg_${s.name}" style="display:none; font-size:12px;">
                        <div style="display:flex; flex-direction:column; gap:8px;">
                            <button onclick="loadGroupsForBot('${s.name}')" style="padding:6px;border:none;border-radius:6px;background:#64b5f6;color:#000;font-weight:700;font-size:11px;cursor:pointer;">
                                🔍 Carregar Grupos do WhatsApp
                            </button>
                            <div>
                                <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">📤 Grupos Destino (encaminhar para)</label>
                                <div id="cfg_target_${s.name}" style="max-height:120px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;">
                                    <span style="color:var(--text-dim)">Clique "Carregar Grupos" primeiro</span>
                                </div>
                            </div>
                            <div>
                                <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">📥 Grupos Monitorados (capturar reações de)</label>
                                <div id="cfg_monitored_${s.name}" style="max-height:120px;overflow-y:auto;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px;font-size:11px;">
                                    <span style="color:var(--text-dim)">Clique "Carregar Grupos" primeiro</span>
                                </div>
                            </div>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
                                <div>
                                    <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">IDs Moderadores</label>
                                    <input id="cfg_modids_${s.name}" type="text" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px;font-size:11px;" placeholder="5511...">
                                </div>
                                <div>
                                    <label style="font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px;">Emoji</label>
                                    <input id="cfg_emoji_${s.name}" type="text" style="width:60px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px;font-size:11px;" value="🔁">
                                </div>
                            </div>
                            <button onclick="saveBotConfig('${s.name}')" style="padding:8px;border:none;border-radius:6px;background:var(--accent);color:white;font-weight:700;font-size:12px;cursor:pointer;">
                                💾 Salvar Config
                            </button>
                        </div>
                    </div>

                    <!-- Session Controls -->
                    <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
                        <button onclick="sessionAction('${s.name}','start')" style="width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;background:#00b894;color:white;">
                            ▶ Iniciar / Reconectar
                        </button>
                        <button onclick="sessionAction('${s.name}','close')" style="width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;background:#fdcb6e;color:#2d3436;">
                            ⏹ Fechar Sessão
                        </button>
                        <button onclick="sessionAction('${s.name}','logout')" style="width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;background:#e17055;color:white;">
                            🔓 Deslogar (novo QR)
                        </button>
                        <button onclick="fetchQRFor('${s.name}')" style="width:100%;padding:10px;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;background:#6c5ce7;color:white;">
                            🔄 Atualizar QR Code
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderAddCard() {
            return `
            <div style="display:flex; flex-direction:column; gap:12px;">
                <div class="card" onclick="addNewOperator()" style="border:2px dashed var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; min-height:140px; transition:all 0.3s;">
                    <div style="text-align:center; color:var(--text-dim);">
                        <div style="font-size:48px; line-height:1;">+</div>
                        <div style="font-size:14px; margin-top:8px;">Adicionar Operador</div>
                    </div>
                </div>
                <div class="card" onclick="resetAllSessions()" style="border:2px dashed #e17055; cursor:pointer; display:flex; align-items:center; justify-content:center; min-height:60px; transition:all 0.3s;">
                    <div style="text-align:center; color:#e17055; font-size:13px; font-weight:600;">
                        🔄 Reset — Limpar tudo e começar com operator_1
                    </div>
                </div>
            </div>`;
        }

        async function pollBotsStatus() {
            const data = await api('/api/bots-status');
            if (!data) return;

            const grid = document.getElementById('operatorGrid');
            const sessions = data.sessions || [];

            // Save QR state before re-render
            for (const s of sessions) {
                const el = document.getElementById(`qr_${s.name}`);
                if (el && el.querySelector('img')) {
                    qrStateCache[s.name] = el.innerHTML;
                }
                // Clear QR cache if session is now connected
                if (s.connected && qrStateCache[s.name] && !qrStateCache[s.name].includes('conectada')) {
                    qrStateCache[s.name] = '<div style="color:var(--green);font-size:14px;">✅ Sessão conectada</div>';
                }
            }

            let html = '';
            for (const s of sessions) {
                html += renderOperatorCard(s);
            }
            html += renderAddCard();
            grid.innerHTML = html;

            // Load config into per-bot fields
            for (const s of sessions) {
                loadBotConfig(s.name);
            }

            // Restore open accordions after re-render
            restoreAccordionState();
        }

        // ── Per-Bot Config ──────────────────────────────────────────────
        const groupsCache = {}; // Cache groups per bot session

        function populateCheckboxes(container, groups, selectedIds, prefix) {
            container.innerHTML = '';
            for (const g of groups) {
                const label = document.createElement('label');
                label.style.cssText = 'display:flex;align-items:center;gap:6px;padding:3px 0;cursor:pointer;color:var(--text);';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.value = g.id;
                cb.name = prefix;
                cb.checked = selectedIds.includes(g.id);
                cb.style.cssText = 'accent-color:var(--green);';
                label.appendChild(cb);
                label.appendChild(document.createTextNode(g.name));
                container.appendChild(label);
            }
            if (!groups.length) container.innerHTML = '<span style="color:var(--text-dim)">Nenhum grupo encontrado</span>';
        }

        async function loadGroupsForBot(name) {
            showToast('Carregando grupos...');
            const data = await api(`/api/session/${name}/groups`);
            if (!data || !data.groups) {
                showToast('Erro ao carregar grupos', 'error');
                return;
            }
            groupsCache[name] = data.groups;
            const groups = data.groups;
            showToast(`✅ ${groups.length} grupos encontrados!`);

            // Populate both selects
            const targetSel = document.getElementById(`cfg_target_${name}`);
            const monSel = document.getElementById(`cfg_monitored_${name}`);

            // Get currently saved config to pre-select
            const cfg = await api('/config');
            const savedTargets = cfg?.target_groups || [];
            const savedMonitored = cfg?.monitored_groups || [];

            if (targetSel) populateCheckboxes(targetSel, groups, savedTargets, 'target');
            if (monSel) populateCheckboxes(monSel, groups, savedMonitored, 'monitored');

            // Also load other config fields
            if (cfg) {
                const el = (id) => document.getElementById(id);
                if (el(`cfg_modids_${name}`)) {
                    el(`cfg_modids_${name}`).value = (cfg.moderator_bot_ids || []).join(',');
                }
                if (el(`cfg_emoji_${name}`)) {
                    el(`cfg_emoji_${name}`).value = cfg.approved_emoji || '🔁';
                }
            }
        }

        async function loadBotConfig(name) {
            const cfg = await api('/config');
            if (!cfg) return;
            const el = (id) => document.getElementById(id);
            // If groups already loaded, pre-select; else show IDs in a disabled label
            if (groupsCache[name]) {
                const groups = groupsCache[name];
                const targetDiv = el(`cfg_target_${name}`);
                const monDiv = el(`cfg_monitored_${name}`);
                // Rebuild checkboxes from cache (re-render destroyed them)
                if (targetDiv) populateCheckboxes(targetDiv, groups, cfg.target_groups || [], 'target');
                if (monDiv) populateCheckboxes(monDiv, groups, cfg.monitored_groups || [], 'monitored');
            }
            if (el(`cfg_modids_${name}`)) {
                el(`cfg_modids_${name}`).value = (cfg.moderator_bot_ids || []).join(',');
            }
            if (el(`cfg_emoji_${name}`)) {
                el(`cfg_emoji_${name}`).value = cfg.approved_emoji || '🔁';
            }
        }

        async function saveBotConfig(name) {
            const el = (id) => document.getElementById(id);

            // Read from multi-select
            const targetDiv = el(`cfg_target_${name}`);
            const monDiv = el(`cfg_monitored_${name}`);
            const tgt = targetDiv ? Array.from(targetDiv.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value) : [];
            const mon = monDiv ? Array.from(monDiv.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value) : [];
            const mod = (el(`cfg_modids_${name}`)?.value || '').split(',').map(s => s.trim()).filter(Boolean);
            const emoji = el(`cfg_emoji_${name}`)?.value?.trim() || '🔁';

            const payload = {
                target_groups: tgt,
                monitored_groups: mon,
                moderator_bot_ids: mod,
                approved_emoji: emoji,
            };

            const data = await api('/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });

            if (data && data.status === 'ok') {
                showToast(`✅ Config de '${name}' salva! (${tgt.length} destinos, ${mon.length} monitorados)`);
            } else {
                showToast('❌ Erro ao salvar', 'error');
            }
        }

        // ── Session Actions ─────────────────────────────────────────────
        async function sessionAction(name, action) {
            if (action === 'start') {
                const data = await api(`/api/session/${name}/start`, { method: 'POST' });
                if (data) {
                    showToast(data.message || 'Sessão iniciada!');
                    startQRPollFor(data.new_session || name);
                    setTimeout(pollBotsStatus, 2000);
                }
            } else if (action === 'logout') {
                if (!confirm(`Deslogar sessão "${name}"? Vai precisar escanear QR novamente.`)) return;
                showToast('Limpando sessão...');
                const data = await api(`/api/session/${name}/logout`, { method: 'POST' });
                if (data && data.status === 'ok') {
                    showToast(`✅ ${data.message}`);
                    delete qrStateCache[name];
                    pollBotsStatus();
                } else {
                    showToast('❌ Erro ao deslogar', 'error');
                }
            } else if (action === 'close') {
                if (!confirm(`Fechar sessão "${name}"?`)) return;
                const data = await api(`/api/session/${name}/close`, { method: 'POST' });
                if (data && data.status === 'ok') {
                    showToast(`✅ Sessão '${name}' removida`);
                    delete qrStateCache[name];
                    pollBotsStatus();
                } else {
                    showToast('❌ Erro', 'error');
                }
            }
        }

        async function deleteOperator(name) {
            if (!confirm(`Excluir operador "${name}"? A sessão será fechada e removida.`)) return;
            const data = await api(`/api/session/${name}/close`, { method: 'POST' });
            if (data && data.status === 'ok') {
                showToast(`✅ Operador '${name}' excluído`);
                delete qrStateCache[name];
                stopQRPollFor(name);
                await pollBotsStatus();
            } else {
                showToast(data?.message || 'Erro ao excluir', 'error');
            }
        }

        async function addNewOperator() {
            const data = await api('/api/session/new', { method: 'POST' });
            if (data && data.status === 'success') {
                showToast(data.message || 'Novo operador criado!');
                await pollBotsStatus();
                if (data.new_session) {
                    startQRPollFor(data.new_session);
                }
            } else {
                showToast(data?.message || 'Erro ao criar operador', 'error');
            }
        }

        async function resetAllSessions() {
            if (!confirm('⚠️ Isso vai FECHAR todas as sessões e criar operator_1 do zero. Continuar?')) return;
            showToast('Resetando sessões...');
            const data = await api('/api/sessions/reset', { method: 'POST' });
            if (data && data.status === 'success') {
                showToast(data.message || 'Reset completo!');
                Object.keys(qrStateCache).forEach(k => delete qrStateCache[k]);
                await pollBotsStatus();
                if (data.new_session) {
                    startQRPollFor(data.new_session);
                }
            } else {
                showToast(data?.message || 'Erro no reset', 'error');
            }
        }

        // ── QR Code per session (40 attempts = 120s) ────────────────────
        function stopQRPollFor(name) {
            if (qrPollers[name]) {
                clearInterval(qrPollers[name].timer);
                delete qrPollers[name];
            }
        }

        function startQRPollFor(name) {
            stopQRPollFor(name);
            let count = 0;
            const area = document.getElementById(`qr_${name}`);
            const waitingHtml = '<div style="color:var(--yellow);font-size:13px;">⏳ Aguardando QR Code...</div>';
            if (area) area.innerHTML = waitingHtml;
            qrStateCache[name] = waitingHtml;

            qrPollers[name] = { timer: setInterval(async () => {
                count++;
                if (count > 40) {
                    stopQRPollFor(name);
                    const msg = '<div style="color:var(--red);font-size:13px;">Timeout — tente novamente</div>';
                    const a = document.getElementById(`qr_${name}`);
                    if (a) a.innerHTML = msg;
                    qrStateCache[name] = msg;
                    return;
                }
                const data = await api(`/api/session/${name}/qr`);
                const a = document.getElementById(`qr_${name}`);
                if (data && data.qr) {
                    const imgHtml = `<img src="${data.qr}" alt="QR" style="max-width:100%;border-radius:8px;">`;
                    if (a) a.innerHTML = imgHtml;
                    qrStateCache[name] = imgHtml;
                    showToast('QR Code pronto!');
                    stopQRPollFor(name);
                } else if (data && data.status === 'connected') {
                    const connHtml = '<div style="color:var(--green);font-size:14px;">✅ Sessão conectada</div>';
                    if (a) a.innerHTML = connHtml;
                    qrStateCache[name] = connHtml;
                    stopQRPollFor(name);
                } else {
                    const waitHtml = `<div style="color:var(--yellow);font-size:13px;">⏳ ${data?.status || 'aguardando'}... (${count}/40)</div>`;
                    if (a) a.innerHTML = waitHtml;
                    qrStateCache[name] = waitHtml;
                }
            }, 3000)};
        }

        async function fetchQRFor(name) {
            const data = await api(`/api/session/${name}/qr`);
            const area = document.getElementById(`qr_${name}`);
            if (!area) return;
            if (data && data.qr) {
                const imgHtml = `<img src="${data.qr}" alt="QR" style="max-width:100%;border-radius:8px;">`;
                area.innerHTML = imgHtml;
                qrStateCache[name] = imgHtml;
            } else if (data && data.status === 'connected') {
                const h = '<div style="color:var(--green);font-size:14px;">✅ Sessão conectada</div>';
                area.innerHTML = h;
                qrStateCache[name] = h;
            } else {
                area.innerHTML = `<div style="color:var(--text-dim);font-size:13px;">Status: ${data?.status || 'erro'}</div>`;
            }
        }

        // ── Init ────────────────────────────────────────────────────────
        let logPollTimer = null;
        let logSince = null;
        let logPollActive = true;

        function colorizeLog(entry) {
            let color = '#c5cdd9';
            let prefix = '';
            const msg = entry.msg || '';
            const level = entry.level || '';

            if (level === 'WARNING') { color = '#f5a623'; prefix = '⚠️ '; }
            else if (level === 'ERROR') { color = '#ff5252'; prefix = '❌ '; }
            else if (msg.includes('WEBHOOK')) { color = '#64b5f6'; prefix = '📨 '; }
            else if (msg.includes('REACTION')) { color = '#ab47bc'; prefix = '⚡ '; }
            else if (msg.includes('ENGINE')) { color = '#66bb6a'; prefix = '🔄 '; }
            else if (msg.includes('QR')) { color = '#26c6da'; prefix = '📱 '; }

            const ts = (entry.ts || '').substring(0, 8);
            return `<span style="color:#555">${ts}</span> ${prefix}<span style="color:${color}">${msg}</span>`;
        }

        async function pollLogs() {
            if (!logPollActive) return;
            try {
                const url = logSince ? `/api/logs?since=${encodeURIComponent(logSince)}` : '/api/logs';
                const data = await api(url);
                if (data && data.logs && data.logs.length > 0) {
                    const box = document.getElementById('logBox');
                    const wasAtBottom = box.scrollTop + box.clientHeight >= box.scrollHeight - 30;
                    for (const entry of data.logs) {
                        box.innerHTML += colorizeLog(entry) + '\n';
                    }
                    logSince = data.timestamp;
                    // Keep max 500 lines in DOM
                    const lines = box.innerHTML.split('\n');
                    if (lines.length > 500) {
                        box.innerHTML = lines.slice(-500).join('\n');
                    }
                    if (wasAtBottom) box.scrollTop = box.scrollHeight;
                } else if (data) {
                    logSince = data.timestamp;
                }
            } catch (e) { /* silent */ }
        }

        function toggleLogPoll() {
            logPollActive = !logPollActive;
            const btn = document.getElementById('logToggleBtn');
            if (logPollActive) {
                btn.textContent = '⏸ Pausar';
                btn.style.background = '#00e676';
            } else {
                btn.textContent = '▶ Retomar';
                btn.style.background = '#f5a623';
            }
        }

        function clearLogPanel() {
            document.getElementById('logBox').innerHTML = '';
            logSince = new Date().toISOString();
        }

        document.addEventListener('DOMContentLoaded', () => {
            pollHealth();
            pollBotsStatus();
            pollLogs();
            pollInterval = setInterval(pollHealth, 5000);
            setInterval(pollBotsStatus, 10000);
            setInterval(pollLogs, 2000);
        });
    </script>
</body>

</html>
